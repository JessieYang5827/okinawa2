<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>上班沒精神 下班飛沖繩</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
  .font-display { font-family: 'Zen Maru Gothic', sans-serif; }
  textarea { resize: none; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="bg-[#F5E7CB] text-[#33475A] pb-10 min-h-screen">

<div id="app"></div>

<script>
const { createApp, ref, reactive, computed, watch } = Vue;

const STORAGE_KEY = "okinawa-trip-2026-07-web";

const CATEGORIES = [
  { key: "food", label: "餐飲", emoji: "🍜", color: "#A64D3D" },
  { key: "transport", label: "交通", emoji: "🚌", color: "#487196" },
  { key: "shopping", label: "購物", emoji: "🛍️", color: "#F4CB4E" },
  { key: "hotel", label: "住宿", emoji: "🏨", color: "#E6D3A0" },
  { key: "ticket", label: "門票體驗", emoji: "🎫", color: "#7C3B2E" },
  { key: "other", label: "其他", emoji: "✨", color: "#345670" },
];

const TAX_OPTIONS = ["內稅 (10%)", "內稅 (8%)", "外稅", "免稅"];

const FLIGHTS = [
  { type: "去程", date: "7/20", weekday: "一", duration: "1小時25分",
    fromTime: "13:30", fromPlace: "TPE 台北 臺灣桃園國際機場 T1",
    toTime: "15:55", toPlace: "OKA 沖繩 那霸機場",
    airline: "泰國亞航 FD230", aircraft: "空中巴士 A321neo", cabin: "經濟艙" },
  { type: "回程", date: "7/24", weekday: "五", duration: "1小時35分",
    fromTime: "16:55", fromPlace: "OKA 沖繩 那霸機場",
    toTime: "17:30", toPlace: "TPE 台北 臺灣桃園國際機場 T1",
    airline: "泰國亞航 FD231", aircraft: "空中巴士 A321neo", cabin: "經濟艙" },
];

const DEFAULT_DAYS = [
  { date: "7/20", weekday: "一", title: "", hotel: "蒙特利拉蘇瑞那霸酒店",
    note: "下飛機領完行李後，前往單軌電車「那霸機場」站，並購票前往「縣廳前」站（票價：¥250）",
    itinerary: [
      { time: "08:00", place: "🏠 出發" },
      { time: "10:30", place: "TPE 台灣桃園國際機場" },
      { time: "13:30", place: "🛫 起飛" },
      { time: "15:55", place: "🛬 抵達 OKA 沖繩那霸機場" },
      { time: "17:40", place: "（搭乘單軌電車）那霸機場－縣廳前站" },
      { time: "18:00", place: "入住飯店" }
    ],
    items: [] },
  { date: "7/21", weekday: "二", title: "", hotel: "", note: "",
    itinerary: [], items: [] },
  { date: "7/22", weekday: "三", title: "", hotel: "", note: "",
    itinerary: [], items: [] },
  { date: "7/23", weekday: "四", title: "", hotel: "", note: "",
    itinerary: [], items: [] },
  { date: "7/24", weekday: "五", title: "", hotel: "", note: "",
    itinerary: [
      { time: "16:55", place: "OKA 出發 ✈️" },
      { time: "17:30", place: "抵達 TPE ✈️" }
    ],
    items: [] },
];

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

const App = {
  setup() {
    const saved = loadState();

    const rate = ref(saved?.rate ?? 0.21);
    const rateInput = ref(String(rate.value));

    const days = ref(saved?.days ?? JSON.parse(JSON.stringify(DEFAULT_DAYS)));

    const activeDay = ref(0);

    const newItemShop = ref("");
    const newItemName = ref("");
    const newItemAmount = ref("");
    const newItemTax = ref("內稅 (10%)");
    const newItemCategory = ref(CATEGORIES[0].key);

    let saveTimer = null;

    watch([rate, days], () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({ rate: rate.value, days: days.value })
        );
      }, 200);
    }, { deep: true });

    function applyRate() {
      const v = parseFloat(rateInput.value);
      if (!isNaN(v) && v > 0) rate.value = v;
    }

    function addItem() {
      const amt = parseFloat(newItemAmount.value);
      if (!newItemName.value || isNaN(amt)) return;

      days.value[activeDay.value].items.push({
        id: uid(),
        shop: newItemShop.value || "未指定",
        name: newItemName.value,
        amount: amt,
        tax: newItemTax.value,
        category: newItemCategory.value
      });

      newItemShop.value = "";
      newItemName.value = "";
      newItemAmount.value = "";
    }

    function removeItem(i) {
      days.value[activeDay.value].items.splice(i, 1);
    }

    const totalJPY = computed(() =>
      days.value.reduce((s, d) =>
        s + d.items.reduce((a, b) => a + Number(b.amount), 0), 0
      )
    );

    const totalTWD = computed(() =>
      Math.round(totalJPY.value * rate.value)
    );

    function cat(key) {
      return CATEGORIES.find(c => c.key === key) || CATEGORIES[0];
    }

    return {
      days,
      rate,
      rateInput,
      activeDay,
      newItemShop,
      newItemName,
      newItemAmount,
      newItemTax,
      newItemCategory,
      applyRate,
      addItem,
      removeItem,
      totalJPY,
      totalTWD,
      cat,
      CATEGORIES,
      FLIGHTS
    };
  },

  template: `
  <div class="px-4 py-4">

    <div class="text-xl font-bold mb-2">
      上班沒精神 下班飛沖繩
    </div>

    <div class="mb-2">
      💰 ¥{{ totalJPY }} ≈ NT$ {{ totalTWD }}
    </div>

    <div class="mb-3">
      匯率：
      <input v-model="rateInput" class="border px-2 w-16">
      <button @click="applyRate">套用</button>
    </div>

    <div class="flex gap-2 mb-3 overflow-x-auto">
      <button v-for="(d,i) in days"
        @click="activeDay=i"
        class="px-2 py-1 border"
        :class="activeDay===i ? 'bg-black text-white' : ''">
        Day {{ i+1 }}
      </button>
    </div>

    <div class="mb-4">
      <h3 class="font-bold">{{ days[activeDay].date }}</h3>

      <div v-for="(item,i) in days[activeDay].items" :key="item.id">
        {{ cat(item.category).emoji }} {{ item.name }} ¥{{ item.amount }}
        <button @click="removeItem(i)">✕</button>
      </div>

      <div class="mt-2">
        <input v-model="newItemShop" placeholder="店名">
        <input v-model="newItemName" placeholder="品項">
        <input v-model="newItemAmount" placeholder="金額">

        <select v-model="newItemCategory">
          <option v-for="c in CATEGORIES" :value="c.key">
            {{ c.emoji }} {{ c.label }}
          </option>
        </select>

        <button @click="addItem">新增</button>
      </div>
    </div>

  </div>
  `
};
</script>

<script>
(function boot() {
  function mount() {
    const el = document.getElementById("app");
    if (!el || !window.Vue?.createApp) {
      return setTimeout(mount, 50);
    }
    window.Vue.createApp(App).mount("#app");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", mount);
  } else {
    mount();
  }
})();
</script>

</body>
</html>

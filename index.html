<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>上班沒精神 下班飛沖繩</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
  .font-display { font-family: 'Zen Maru Gothic', sans-serif; }
  textarea { resize: none; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="bg-[#F5E7CB] text-[#33475A] pb-10 min-h-screen">

<div id="app"></div>

<script>
const { ref, computed, watch } = Vue;

const STORAGE_KEY = "okinawa-trip-2026-07-web";

const CATEGORIES = [
  { key: "food", label: "餐飲", emoji: "🍜", color: "#A64D3D" },
  { key: "transport", label: "交通", emoji: "🚌", color: "#487196" },
  { key: "shopping", label: "購物", emoji: "🛍️", color: "#F4CB4E" },
  { key: "hotel", label: "住宿", emoji: "🏨", color: "#E6D3A0" },
  { key: "ticket", label: "門票體驗", emoji: "🎫", color: "#7C3B2E" },
  { key: "other", label: "其他", emoji: "✨", color: "#345670" },
];

const DEFAULT_DAYS = [
  { date: "7/20", weekday: "一", items: [] },
  { date: "7/21", weekday: "二", items: [] },
  { date: "7/22", weekday: "三", items: [] },
  { date: "7/23", weekday: "四", items: [] },
  { date: "7/24", weekday: "五", items: [] },
];

function load() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch {
    return null;
  }
}

const App = {
  setup() {
    const saved = load();

    const days = ref(saved?.days || DEFAULT_DAYS);
    const rate = ref(saved?.rate || 0.21);
    const rateInput = ref(String(rate.value));

    const activeDay = ref(0);

    const newName = ref("");
    const newAmount = ref("");
    const newCategory = ref("food");

    watch([days, rate], () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        days: days.value,
        rate: rate.value
      }));
    }, { deep: true });

    function addItem() {
      const amt = parseFloat(newAmount.value);
      if (!newName.value || isNaN(amt)) return;

      days.value[activeDay.value].items.push({
        id: Date.now(),
        name: newName.value,
        amount: amt,
        category: newCategory.value
      });

      newName.value = "";
      newAmount.value = "";
    }

    function removeItem(i) {
      days.value[activeDay.value].items.splice(i, 1);
    }

    const totalJPY = computed(() =>
      days.value.reduce((s, d) =>
        s + d.items.reduce((a, b) => a + Number(b.amount), 0), 0)
    );

    const totalTWD = computed(() =>
      Math.round(totalJPY.value * rate.value)
    );

    function applyRate() {
      const v = parseFloat(rateInput.value);
      if (v > 0) rate.value = v;
    }

    function cat(key) {
      return CATEGORIES.find(c => c.key === key);
    }

    return {
      days, rate, rateInput, activeDay,
      newName, newAmount, newCategory,
      addItem, removeItem,
      totalJPY, totalTWD,
      applyRate, cat, CATEGORIES
    };
  },

  template: `
  <div style="padding:16px">

    <h2 style="font-size:20px;font-weight:bold;">
      上班沒精神 下班飛沖繩
    </h2>

    <div style="margin:10px 0;">
      💰 ¥{{ totalJPY }} ≈ NT$ {{ totalTWD }}
    </div>

    <div style="margin-bottom:10px;">
      匯率：
      <input v-model="rateInput" style="width:60px;border:1px solid #ccc;">
      <button @click="applyRate">OK</button>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button v-for="(d,i) in days" :key="i"
        @click="activeDay=i"
        :style="{padding:'6px',border: activeDay===i?'2px solid #000':'1px solid #ccc'}">
        Day {{i+1}}
      </button>
    </div>

    <div>
      <h3>{{ days[activeDay].date }}</h3>

      <div v-for="(item,i) in days[activeDay].items" :key="item.id">
        {{ cat(item.category).emoji }} {{ item.name }} ¥{{ item.amount }}
        <button @click="removeItem(i)">✕</button>
      </div>

      <input v-model="newName" placeholder="品項">
      <input v-model="newAmount" placeholder="金額">
      
      <select v-model="newCategory">
        <option v-for="c in CATEGORIES" :value="c.key">
          {{ c.emoji }} {{ c.label }}
        </option>
      </select>

      <button @click="addItem">新增</button>
    </div>

  </div>
  `
};

function boot() {
  const el = document.getElementById("app");
  if (!el || !window.Vue) return setTimeout(boot, 50);

  Vue.createApp(App).mount("#app");
}

boot();
</script>

</body>
</html>

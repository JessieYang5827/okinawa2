<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>上班沒精神 下班飛沖繩</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<style>
  body { font-family: 'Noto Sans TC', sans-serif; }
  .font-display { font-family: 'Zen Maru Gothic', sans-serif; }
  textarea { resize: none; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="bg-[#F5E7CB] text-[#33475A] pb-10 min-h-screen">

<div id="app">
  <!-- fallback，避免 Vue 沒載到時整頁空白 -->
  <div style="padding:20px;text-align:center;color:#666;">
    載入中...
  </div>
</div>

<script>
const { createApp, ref, reactive, computed, watch } = Vue;

const STORAGE_KEY = "okinawa-trip-2026-07-web";

const CATEGORIES = [
  { key: "food", label: "餐飲", emoji: "🍜", color: "#A64D3D" },
  { key: "transport", label: "交通", emoji: "🚌", color: "#487196" },
  { key: "shopping", label: "購物", emoji: "🛍️", color: "#F4CB4E" },
  { key: "hotel", label: "住宿", emoji: "🏨", color: "#E6D3A0" },
  { key: "ticket", label: "門票體驗", emoji: "🎫", color: "#7C3B2E" },
  { key: "other", label: "其他", emoji: "✨", color: "#345670" },
];

const TAX_OPTIONS = ["內稅 (10%)", "內稅 (8%)", "外稅", "免稅"];

const DEFAULT_DAYS = [
  { date: "7/20", weekday: "一", title: "", hotel: "蒙特利拉蘇瑞那霸酒店", note: "", itinerary: [], items: [] },
  { date: "7/21", weekday: "二", title: "", hotel: "", note: "", itinerary: [], items: [] },
  { date: "7/22", weekday: "三", title: "", hotel: "", note: "", itinerary: [], items: [] },
  { date: "7/23", weekday: "四", title: "", hotel: "", note: "", itinerary: [], items: [] },
  { date: "7/24", weekday: "五", title: "", hotel: "", note: "", itinerary: [], items: [] },
];

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

const App = {
  setup() {
    const saved = loadState();

    const rate = ref(saved?.rate ?? 0.21);
    const rateInput = ref(String(rate.value));

    const days = ref(
      saved?.days ??
      DEFAULT_DAYS.map(d => ({
        ...d,
        itinerary: [],
        items: []
      }))
    );

    const activeDay = ref(0);

    const newItemShop = ref("");
    const newItemName = ref("");
    const newItemAmount = ref("");
    const newItemTax = ref("內稅 (10%)");
    const newItemCategory = ref(CATEGORIES[0].key);

    watch([rate, days], () => {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({ rate: rate.value, days: days.value })
      );
    }, { deep: true });

    function applyRate() {
      const v = parseFloat(rateInput.value);
      if (!isNaN(v) && v > 0) rate.value = v;
    }

    function addItem(idx) {
      const amt = parseFloat(newItemAmount.value);
      if (!newItemName.value || isNaN(amt)) return;

      days.value[idx].items.push({
        id: uid(),
        shop: newItemShop.value || "未指定",
        name: newItemName.value,
        amount: amt,
        tax: newItemTax.value,
        category: newItemCategory.value
      });

      newItemShop.value = "";
      newItemName.value = "";
      newItemAmount.value = "";
    }

    function removeItem(idx, id) {
      days.value[idx].items = days.value[idx].items.filter(i => i.id !== id);
    }

    function dayTotal(day) {
      return day.items.reduce((s, i) => s + Number(i.amount || 0), 0);
    }

    const grandTotalJPY = computed(() =>
      days.value.reduce((s, d) => s + dayTotal(d), 0)
    );

    const grandTotalTWD = computed(() =>
      Math.round(grandTotalJPY.value * rate.value)
    );

    function fmtTWD(n) {
      return Math.round(n).toLocaleString();
    }

    function categoryOf(key) {
      return CATEGORIES.find(c => c.key === key) || CATEGORIES[0];
    }

    return {
      days,
      activeDay,
      rate,
      rateInput,
      applyRate,
      newItemShop,
      newItemName,
      newItemAmount,
      newItemTax,
      newItemCategory,
      addItem,
      removeItem,
      dayTotal,
      grandTotalJPY,
      grandTotalTWD,
      fmtTWD,
      categoryOf,
      CATEGORIES,
      TAX_OPTIONS
    };
  },

  template: `
  <div style="padding:20px">
    <h1 style="font-weight:bold;font-size:20px;margin-bottom:10px;">
      上班沒精神 下班飛沖繩
    </h1>

    <div style="margin-bottom:10px;">
      💰 總花費：¥{{ grandTotalJPY }} ≈ NT$ {{ fmtTWD(grandTotalTWD) }}
    </div>

    <div style="margin-bottom:20px;">
      匯率：
      <input v-model="rateInput" style="border:1px solid #ccc;width:60px;" />
      <button @click="applyRate">套用</button>
    </div>

    <div v-for="(d, idx) in days" :key="idx" style="border:1px solid #ddd;margin-bottom:10px;padding:10px;">
      <h3>Day {{ idx + 1 }} - {{ d.date }}</h3>

      <div v-for="i in d.items" :key="i.id">
        {{ categoryOf(i.category).emoji }} {{ i.name }} - ¥{{ i.amount }}
        <button @click="removeItem(idx, i.id)">X</button>
      </div>

      <input v-model="newItemShop" placeholder="店名" />
      <input v-model="newItemName" placeholder="品項" />
      <input v-model="newItemAmount" placeholder="金額" />
      <button @click="addItem(idx)">新增</button>
    </div>
  </div>
  `
};

window.addEventListener("DOMContentLoaded", () => {
  const app = createApp(App);
  app.mount("#app");
});
</script>

</body>
</html>
